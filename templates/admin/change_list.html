{% extends "admin/base.html" %}
{% load i18n %}

{% block extrahead %}
{{ block.super }}
<style>
    .change-list-container {
        padding: 1.5rem;
    }
    
    #changelist {
        background: #0d1117;
        border: 1px solid #333;
        border-radius: 8px;
    }
    
    #changelist-form {
        display: flex;
        flex-direction: column;
    }
    
    #changelist .toplinks {
        background: #0d1117;
        border-bottom: 1px solid #333;
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
    }
    
    #changelist .object-tools {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        gap: 0.5rem;
    }
    
    #changelist .object-tools a,
    #changelist .object-tools input {
        background: transparent;
        border: 1px solid #00a8e8;
        color: #00a8e8;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        text-decoration: none;
        font-size: 0.875rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    #changelist .object-tools a:hover,
    #changelist .object-tools input:hover {
        background: #00a8e8;
        color: #0a0a0a;
        box-shadow: 0 0 10px rgba(0, 168, 232, 0.5);
    }
    
    #changelist-filter {
        background: #0d1117;
        border-right: 1px solid #333;
        padding: 1rem;
    }
    
    #changelist-filter h3 {
        color: #00a8e8;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin: 0 0 1rem 0;
    }
    
    #changelist-filter ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }
    
    #changelist-filter li {
        padding: 0.25rem 0;
    }
    
    #changelist-filter li a {
        color: #9ca3af;
        text-decoration: none;
    }
    
    #changelist-filter li.selected a {
        color: #00a8e8;
    }
    
    #toolbar {
        background: #0d1117;
        border-bottom: 1px solid #333;
        padding: 1rem;
    }
    
    #searchbar {
        background: #0a0a0a !important;
        border: 1px solid #333 !important;
        color: #00a8e8 !important;
        padding: 0.5rem 1rem !important;
        border-radius: 4px !important;
    }
    
    #searchbar:focus {
        border-color: #00a8e8 !important;
        box-shadow: 0 0 5px rgba(0, 168, 232, 0.5) !important;
        outline: none !important;
    }
    
    #toolbar input[type="submit"] {
        background: #00a8e8;
        border: none;
        color: #0a0a0a;
        padding: 0.5rem 1rem;
        border-radius: 4px;
        cursor: pointer;
    }
    
    .results {
        width: 100%;
    }
    
    .results table {
        width: 100%;
        border-collapse: collapse;
    }
    
    .results th {
        background: #0d1117;
        color: #00a8e8;
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid #333;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    
    .results td {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #333;
        color: #e5e7eb;
    }
    
    .results tr:hover {
        background: rgba(0, 168, 232, 0.05);
    }
    
    .results a {
        color: #00a8e8;
        text-decoration: none;
    }
    
    .results a:hover {
        text-decoration: underline;
    }
    
    .row1 { background: #0d1117; }
    .row2 { background: #0a0a0a; }
    
    .paginator {
        background: #0d1117;
        border-top: 1px solid #333;
        padding: 1rem;
        text-align: center;
    }
    
    .paginator a, .paginator span {
        display: inline-block;
        padding: 0.25rem 0.5rem;
        margin: 0 0.125rem;
        border: 1px solid #333;
        border-radius: 4px;
        color: #9ca3af;
        text-decoration: none;
    }
    
    .paginator a:hover {
        border-color: #00a8e8;
        color: #00a8e8;
    }
    
    .paginator .this-page {
        border-color: #00a8e8;
        color: #00a8e8;
    }
    
    .actions {
        background: #0d1117;
        border-top: 1px solid #333;
        padding: 0.75rem 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    
    .actions label {
        color: #9ca3af;
        font-size: 0.875rem;
    }
    
    .actions select {
        background: #0a0a0a;
        border: 1px solid #333;
        color: #00a8e8;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
    }
    
    .actions button {
        background: transparent;
        border: 1px solid #ef4444;
        color: #ef4444;
        padding: 0.25rem 0.75rem;
        border-radius: 4px;
        cursor: pointer;
    }
    
    .actions button:hover {
        background: #ef4444;
        color: #0a0a0a;
    }
</style>
{% endblock %}

{% block content %}
<div class="change-list-container">
    {% block result_list %}
        {{ block.super }}
    {% endblock %}
</div>
{% endblock %}
